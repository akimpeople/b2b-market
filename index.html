<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2B Fresh Market</title>

  <link rel="stylesheet" href="styles.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <header class="header">
    <div class="container">
      <h1>B2B Fresh Market</h1>
      <p>Поставки овощей и зелени для ресторанов</p>
    </div>
  </header>

  <main class="container">

    <div id="loader" class="loader">
      Загрузка товаров...
    </div>

    <div id="products" class="products-grid"></div>

  </main>

  <div class="cart-bar" id="cartBar">

    <div class="cart-info">
      Итого: <span id="cartTotal">0</span> ₸
    </div>

    <button id="checkoutBtn" disabled>
      Оформить заказ
    </button>

  </div>

  <div class="modal hidden" id="modal">

    <div class="modal-content">

      <h2>Оформление заказа</h2>

      <form id="orderForm">

        <input
          type="text"
          id="customer_name"
          placeholder="Имя"
          required
        />

        <input
          type="text"
          id="company_name"
          placeholder="Компания / Ресторан"
          required
        />

        <input
          type="text"
          id="phone"
          placeholder="Телефон"
        />

        <input
          type="text"
          id="address"
          placeholder="Адрес"
        />

        <textarea
          id="comment"
          placeholder="Комментарий"
        ></textarea>

        <button type="submit">
          Подтвердить заказ
        </button>

      </form>

      <button class="close" id="closeModal">
        Закрыть
      </button>

    </div>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
